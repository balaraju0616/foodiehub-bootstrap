<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - FoodieHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">FoodieHub</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<!-- CONTACT FORM -->
<section class="container my-5">

  <h2 class="text-center mb-4">Contact Us 📞</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <!-- Success Message -->
      <div id="successMsg" class="alert alert-success d-none">
        Message sent successfully! ✅
      </div>

      <form onsubmit="handleSubmit(event)">

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="Enter your name" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <!-- Message -->
        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="4" placeholder="Write your message" required></textarea>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary w-100">Send Message</button>

      </form>

    </div>
  </div>

</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4 mt-5">
  <div class="container">
    <h5 class="mb-3">FoodieHub 🍔</h5>
    <p class="mb-2">Delicious food delivered at your doorstep</p>
    <p class="mb-0">© 2026 FoodieHub | All Rights Reserved</p>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script>
  function handleSubmit(event) {
    event.preventDefault();

    let msg = document.getElementById("successMsg");

    msg.classList.remove("d-none"); // show alert
    msg.style.display = "block";    

    event.target.reset(); // clear form
  }
</script>

</body>
</html>
